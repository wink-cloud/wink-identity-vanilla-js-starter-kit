<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Cancelled - Wink Identity</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      max-width: 420px;
      text-align: center;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #1e293b;
    }

    p {
      margin: 0 0 24px;
      color: #64748b;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-block;
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login cancelled</h2>
    <p>You have cancelled the login process. You can try again when you're ready.</p>
    <a href="/" class="btn" id="backLink">Return to app</a>
  </div>

  <script>
    document.getElementById("backLink").href = window.location.origin + "/";
  </script>
</body>
</html>
